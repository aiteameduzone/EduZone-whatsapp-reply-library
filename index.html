<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduZone WhatsApp Reply Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF7F2;
    --surface: #FFFFFF;
    --surface-sunken: #F2EEE6;
    --border: #E8E1D3;
    --border-strong: #D4CBB5;
    --text: #1C1814;
    --text-dim: #6B6357;
    --text-faint: #9E948A;
    --accent: #E85D2D;
    --accent-dark: #C34D23;
    --accent-soft: #FFE8DC;
    --success: #0F7C42;
    --success-soft: #DFF3E6;
    --whatsapp: #25D366;
    --whatsapp-bg: #E7F8EE;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow-sm: 0 1px 2px rgba(28, 24, 20, 0.05);
    --shadow: 0 4px 16px rgba(28, 24, 20, 0.06);
    --shadow-lg: 0 12px 40px rgba(28, 24, 20, 0.10);
    --mono: "JetBrains Mono", ui-monospace, monospace;
    --ui: "Instrument Sans", -apple-system, sans-serif;
    --display: "Fraunces", Georgia, serif;
    --arabic: "IBM Plex Sans Arabic", "Segoe UI", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: var(--ui);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* Layout */
  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: 100vh;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .brand {
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--border);
  }

  .brand-title {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .brand-title em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }

  .brand-sub {
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-top: 6px;
    font-weight: 500;
  }

  .search-box {
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .search-input {
    width: 100%;
    padding: 9px 12px 9px 34px;
    font-family: var(--ui);
    font-size: 13px;
    color: var(--text);
    background: var(--surface-sunken);
    border: 1px solid transparent;
    border-radius: var(--radius);
    transition: all 0.15s;
  }

  .search-input:focus {
    outline: none;
    background: var(--surface);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .search-input::placeholder {
    color: var(--text-faint);
  }

  .search-icon {
    position: absolute;
    left: 30px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-faint);
    pointer-events: none;
  }

  .kbd {
    position: absolute;
    right: 26px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 5px;
    pointer-events: none;
  }

  .nav {
    flex: 1;
    overflow-y: auto;
    padding: 8px 10px 20px;
  }

  .nav::-webkit-scrollbar { width: 6px; }
  .nav::-webkit-scrollbar-track { background: transparent; }
  .nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .nav-group {
    margin-top: 14px;
  }

  .nav-group:first-child {
    margin-top: 8px;
  }

  .nav-group-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 6px 12px 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13.5px;
    color: var(--text);
    transition: background 0.12s;
    user-select: none;
    border: 1px solid transparent;
  }

  .nav-item:hover {
    background: var(--surface-sunken);
  }

  .nav-item.active {
    background: var(--accent-soft);
    color: var(--accent-dark);
    font-weight: 500;
    border-color: rgba(232, 93, 45, 0.15);
  }

  .nav-item-emoji {
    font-size: 15px;
    flex-shrink: 0;
    width: 20px;
    text-align: center;
  }

  .nav-item-label {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .nav-item-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    background: var(--surface-sunken);
    border-radius: 3px;
    padding: 1px 5px;
  }

  .nav-item.active .nav-item-badge {
    color: var(--accent-dark);
    background: rgba(232, 93, 45, 0.12);
  }

  /* Main content */
  .main {
    overflow-y: auto;
    padding: 40px 48px 80px;
  }

  .main::-webkit-scrollbar { width: 8px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .content-wrap {
    max-width: 760px;
    margin: 0 auto;
  }

  .content-header {
    margin-bottom: 28px;
  }

  .content-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .content-title {
    font-family: var(--display);
    font-size: 36px;
    font-weight: 500;
    letter-spacing: -0.025em;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .content-title em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }

  .content-description {
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.55;
    max-width: 620px;
  }

  .meta-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 16px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px 10px;
  }

  .chip-hot {
    background: var(--whatsapp-bg);
    color: #0A6E30;
    border-color: rgba(15, 124, 66, 0.25);
  }

  .chip-warn {
    background: #FFF4E5;
    color: #A34D00;
    border-color: rgba(163, 77, 0, 0.2);
  }

  /* Message card */
  .message-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .message-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    background: var(--surface-sunken);
    border-bottom: 1px solid var(--border);
  }

  .message-card-head-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .wa-dot {
    width: 7px;
    height: 7px;
    background: var(--whatsapp);
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.2);
  }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--ui);
    font-size: 12.5px;
    font-weight: 500;
    color: var(--surface);
    background: var(--text);
    border: none;
    border-radius: 7px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .copy-btn:hover {
    background: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(232, 93, 45, 0.25);
  }

  .copy-btn.copied {
    background: var(--success);
  }

  .copy-btn.copied:hover {
    background: var(--success);
    transform: none;
  }

  .message-body {
    padding: 26px 28px;
    font-family: var(--arabic);
    font-size: 15px;
    line-height: 1.85;
    color: var(--text);
    direction: rtl;
    text-align: right;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .message-body .placeholder {
    background: #FFF4E5;
    color: var(--accent-dark);
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--mono);
    border: 1px solid rgba(232, 93, 45, 0.25);
    direction: ltr;
    display: inline-block;
  }

  .message-body .bold {
    font-weight: 700;
    color: var(--text);
  }

  /* Notes section */
  .notes {
    margin-top: 18px;
    background: var(--surface);
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .notes strong {
    color: var(--text);
    font-weight: 600;
  }

  /* Multiple-message variants */
  .variant-label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 28px 0 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .variant-label:first-child {
    margin-top: 0;
  }

  .variant-label::before {
    content: '';
    flex-shrink: 0;
    width: 4px;
    height: 4px;
    background: var(--accent);
    border-radius: 50%;
  }

  .variant-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Quick jump tabs — hidden on desktop, shown on mobile */
  .mobile-tabs {
    display: none;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: var(--surface);
    padding: 12px 22px;
    border-radius: 100px;
    font-size: 13.5px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transition: transform 0.25s cubic-bezier(0.34, 1.25, 0.64, 1), opacity 0.25s;
    pointer-events: none;
    z-index: 100;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .toast-icon {
    width: 18px;
    height: 18px;
    background: var(--success);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 11px;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-faint);
  }

  .empty h3 {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-style: italic;
  }

  /* Responsive */
  @media (max-width: 860px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
    }

    .sidebar {
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: 42vh;
    }

    .main {
      padding: 24px 20px 60px;
    }

    .content-title {
      font-size: 26px;
    }

    .message-body {
      padding: 18px 20px;
      font-size: 14.5px;
    }
  }

  /* Stats bar */
  .stats-bar {
    padding: 12px 22px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-faint);
    background: var(--surface);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .stats-bar strong {
    color: var(--text-dim);
    font-weight: 600;
  }

  /* WhatsApp preview toggle */
  .view-toggle {
    display: inline-flex;
    background: var(--surface-sunken);
    border-radius: 7px;
    padding: 3px;
    border: 1px solid var(--border);
    margin-left: auto;
  }

  .view-toggle button {
    background: transparent;
    border: none;
    padding: 5px 11px;
    font-family: var(--ui);
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text-dim);
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .view-toggle button.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }

  /* WhatsApp preview mode */
  .message-body.whatsapp-view {
    background: #E5DDD5;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(37, 211, 102, 0.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(37, 211, 102, 0.04) 0%, transparent 40%);
    padding: 24px;
    position: relative;
  }

  .message-body.whatsapp-view::before {
    content: '';
    display: block;
    background: #DCF8C6;
    border-radius: 8px 0 8px 8px;
    padding: 14px 16px 8px;
    box-shadow: 0 1px 1px rgba(0,0,0,0.06);
    font-family: var(--arabic);
    font-size: 14.5px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-wrap: break-word;
    direction: rtl;
    text-align: right;
  }
</style>
</head>

// ============================================================
// APP LOGIC
// ============================================================

const GROUP_LABELS = {
  QUALIFY: 'Qualify',
  TRACKS: 'Track Pitches',
  HANDLERS: 'Handlers',
  COUNTRY: 'Country Tweaks',
  RULES: 'Rules & Playbook'
};

let activeId = DATA[0].id;
let searchTerm = '';

function getFilteredData() {
  if (!searchTerm) return DATA;
  const t = searchTerm.toLowerCase();
  return DATA.filter(item => {
    const haystack = [
      item.title, item.titleEm, item.eyebrow, item.description,
      ...(item.chips || []).map(c => c.label),
      ...(item.messages || []).map(m => m.body + (m.label || ''))
    ].join(' ').toLowerCase();
    return haystack.includes(t);
  });
}

function renderNav() {
  const data = getFilteredData();
  const groups = {};
  data.forEach(item => {
    if (!groups[item.group]) groups[item.group] = [];
    groups[item.group].push(item);
  });

  const nav = document.getElementById('nav');
  let html = '';

  Object.keys(GROUP_LABELS).forEach(g => {
    if (!groups[g]) return;
    html += `<div class="nav-group">`;
    html += `<div class="nav-group-label">${GROUP_LABELS[g]}</div>`;
    groups[g].forEach(item => {
      const active = item.id === activeId ? 'active' : '';
      html += `
        <div class="nav-item ${active}" data-id="${item.id}">
          <span class="nav-item-emoji">${item.emoji}</span>
          <span class="nav-item-label">${escapeHtml(item.title)}</span>
          <span class="nav-item-badge">${escapeHtml(item.titleEm)}</span>
        </div>`;
    });
    html += `</div>`;
  });

  if (data.length === 0) {
    html = `<div class="empty"><h3>No matches</h3><p>Try a different search term</p></div>`;
  }

  nav.innerHTML = html;

  nav.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => {
      activeId = el.dataset.id;
      renderNav();
      renderContent();
    });
  });

  document.getElementById('totalCount').textContent = data.length;
}

function renderContent() {
  const item = DATA.find(i => i.id === activeId);
  if (!item) return;

  const content = document.getElementById('content');
  let html = `
    <div class="content-header">
      <div class="content-eyebrow">${escapeHtml(item.eyebrow)}</div>
      <h1 class="content-title">${escapeHtml(item.title)} <em>${escapeHtml(item.titleEm)}</em></h1>
      <p class="content-description">${escapeHtml(item.description)}</p>
      <div class="meta-chips">
        ${(item.chips || []).map(c => `<span class="chip ${c.type ? 'chip-' + c.type : ''}">${escapeHtml(c.label)}</span>`).join('')}
      </div>
    </div>
  `;

  item.messages.forEach((msg, idx) => {
    if (msg.label) {
      html += `<div class="variant-label">${escapeHtml(msg.label)}</div>`;
    }
    const msgId = `msg-${item.id}-${idx}`;
    html += `
      <div class="message-card">
        <div class="message-card-head">
          <div class="message-card-head-label"><span class="wa-dot"></span> WhatsApp ${item.group === 'RULES' || item.group === 'COUNTRY' ? 'Reference' : 'Message'}</div>
          <button class="copy-btn" data-copy-id="${msgId}" data-raw="${encodeURIComponent(msg.body)}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span class="copy-btn-label">Copy</span>
          </button>
        </div>
        <div class="message-body" id="${msgId}">${formatMessage(msg.body)}</div>
      </div>
    `;
  });

  if (item.note) {
    html += `<div class="notes">💡 ${item.note}</div>`;
  }

  content.innerHTML = html;

  content.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const raw = decodeURIComponent(btn.dataset.raw);
      copyText(raw, btn);
    });
  });

  content.scrollTop = 0;
}

function formatMessage(text) {
  // Escape HTML then render formatting
  let out = escapeHtml(text);
  // WhatsApp-style bold: *text* → <span class="bold">text</span>
  out = out.replace(/\*([^\*\n]+?)\*/g, '<span class="bold">$1</span>');
  // Highlight placeholders [SOMETHING]
  out = out.replace(/\[([A-Z_\/0-9]+)\]/g, '<span class="placeholder">[$1]</span>');
  return out;
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const label = btn.querySelector('.copy-btn-label');
    const originalLabel = label.textContent;
    btn.classList.add('copied');
    label.textContent = 'Copied!';
    showToast();
    setTimeout(() => {
      btn.classList.remove('copied');
      label.textContent = originalLabel;
    }, 1800);
  }).catch(err => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.top = '-1000px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast(); } catch (e) {}
    document.body.removeChild(ta);
  });
}

function showToast() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

// Search
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderNav();
});

// Keyboard shortcut Cmd/Ctrl+K
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
  if (e.key === 'Escape' && document.activeElement === searchInput) {
    searchInput.value = '';
    searchTerm = '';
    searchInput.blur();
    renderNav();
  }
});

// Initial render
renderNav();
renderContent();
</script>
