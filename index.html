<style>
:root{--bg:#FAF7F2;--surface:#FFF;--surface-sunken:#F2EEE6;--border:#E8E1D3;--border-strong:#D4CBB5;--text:#1C1814;--text-dim:#6B6357;--text-faint:#9E948A;--accent:#E85D2D;--accent-dark:#C34D23;--accent-soft:#FFE8DC;--success:#0F7C42;--success-soft:#DFF3E6;--whatsapp:#25D366;--whatsapp-bg:#E7F8EE;--camp-color:#0F7C42;--camp-bg:#E7F8EE;--camp-border:rgba(15,124,66,.25);--course-color:#2563EB;--course-bg:#EEF2FF;--course-border:rgba(37,99,235,.25);--radius:10px;--radius-lg:14px;--shadow-sm:0 1px 2px rgba(28,24,20,.05);--shadow:0 4px 16px rgba(28,24,20,.06);--shadow-lg:0 12px 40px rgba(28,24,20,.10);--mono:"JetBrains Mono",ui-monospace,monospace;--ui:"Instrument Sans",-apple-system,sans-serif;--display:"Fraunces",Georgia,serif;--arabic:"IBM Plex Sans Arabic","Segoe UI",sans-serif}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}body{font-family:var(--ui);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.app{display:grid;grid-template-columns:300px 1fr;height:100vh;max-width:1600px;margin:0 auto}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.brand{padding:20px 22px 16px;border-bottom:1px solid var(--border)}.brand-title{font-family:var(--display);font-size:22px;font-weight:500;letter-spacing:-.02em;line-height:1.1}.brand-title em{font-style:italic;color:var(--accent);font-weight:400}.brand-sub{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.12em;margin-top:6px;font-weight:500}
.mode-toggle{display:flex;margin:12px 14px 0;background:var(--surface-sunken);border-radius:8px;padding:3px;gap:2px;border:1px solid var(--border)}.mode-btn{flex:1;padding:7px 4px;border:none;border-radius:6px;font-family:var(--ui);font-size:11.5px;font-weight:600;cursor:pointer;transition:all .15s;background:0 0;color:var(--text-dim);display:flex;align-items:center;justify-content:center;gap:4px}.mode-btn:hover{color:var(--text);background:rgba(0,0,0,.03)}.mode-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}.mode-btn.active[data-mode=camp]{color:var(--camp-color)}.mode-btn.active[data-mode=course]{color:var(--course-color)}.mode-btn.active[data-mode=general]{color:var(--accent)}
.search-box{padding:10px 14px 8px;border-bottom:1px solid var(--border);position:relative}.search-input{width:100%;padding:9px 12px 9px 34px;font-family:var(--ui);font-size:13px;color:var(--text);background:var(--surface-sunken);border:1px solid transparent;border-radius:var(--radius);transition:all .15s}.search-input:focus{outline:none;background:var(--surface);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}.search-input::placeholder{color:var(--text-faint)}.search-icon{position:absolute;left:26px;top:50%;transform:translateY(-50%);color:var(--text-faint);pointer-events:none}.kbd{position:absolute;right:22px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:10px;color:var(--text-faint);background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 5px;pointer-events:none}
.nav{flex:1;overflow-y:auto;padding:6px 10px 20px}.nav::-webkit-scrollbar{width:6px}.nav::-webkit-scrollbar-track{background:transparent}.nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}.nav-group{margin-top:14px}.nav-group:first-child{margin-top:8px}.nav-group-label{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);padding:6px 12px 4px}.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13.5px;color:var(--text);transition:background .12s;user-select:none;border:1px solid transparent}.nav-item:hover{background:var(--surface-sunken)}.nav-item.active{background:var(--accent-soft);color:var(--accent-dark);font-weight:500;border-color:rgba(232,93,45,.15)}.nav-item-emoji{font-size:15px;flex-shrink:0;width:20px;text-align:center}.nav-item-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.nav-item-badge{font-family:var(--mono);font-size:10px;color:var(--text-faint);background:var(--surface-sunken);border-radius:3px;padding:1px 5px;flex-shrink:0}.nav-item.active .nav-item-badge{color:var(--accent-dark);background:rgba(232,93,45,.12)}.badge-camp{background:var(--camp-bg)!important;color:var(--camp-color)!important}.badge-course{background:var(--course-bg)!important;color:var(--course-color)!important}
.stats-bar{padding:12px 22px;border-top:1px solid var(--border);font-size:11px;color:var(--text-faint);background:var(--surface);display:flex;justify-content:space-between;align-items:center}.stats-bar strong{color:var(--text-dim);font-weight:600}
.main{overflow-y:auto;padding:40px 48px 80px}.main::-webkit-scrollbar{width:8px}.main::-webkit-scrollbar-track{background:transparent}.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}.content-wrap{max-width:760px;margin:0 auto}.content-header{margin-bottom:28px}.content-eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}.content-title{font-family:var(--display);font-size:36px;font-weight:500;letter-spacing:-.025em;line-height:1.1;margin-bottom:12px}.content-title em{font-style:italic;color:var(--accent);font-weight:400}.content-description{font-size:15px;color:var(--text-dim);line-height:1.55;max-width:620px}.meta-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;color:var(--text-dim);background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:4px 10px}.chip-hot{background:var(--whatsapp-bg);color:#0A6E30;border-color:rgba(15,124,66,.25)}.chip-warn{background:#FFF4E5;color:#A34D00;border-color:rgba(163,77,0,.2)}.chip-camp{background:var(--camp-bg);color:var(--camp-color);border-color:var(--camp-border)}.chip-course{background:var(--course-bg);color:var(--course-color);border-color:var(--course-border)}
.flow-card{background:var(--whatsapp-bg);border:1px solid var(--camp-border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:22px}.flow-card h4{font-size:13px;font-weight:600;color:var(--camp-color);margin-bottom:10px;display:flex;align-items:center;gap:6px}.flow-steps{display:flex;flex-direction:column;gap:6px}.flow-step{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--text-dim);line-height:1.5}.flow-num{width:20px;height:20px;background:var(--camp-color);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.message-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:16px}.message-card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--surface-sunken);border-bottom:1px solid var(--border)}.message-card-head-label{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);display:flex;align-items:center;gap:8px}.wa-dot{width:7px;height:7px;background:var(--whatsapp);border-radius:50%;box-shadow:0 0 0 3px rgba(37,211,102,.2)}.copy-btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--ui);font-size:12.5px;font-weight:500;color:var(--surface);background:var(--text);border:none;border-radius:7px;padding:7px 14px;cursor:pointer;transition:all .15s}.copy-btn:hover{background:var(--accent);transform:translateY(-1px);box-shadow:0 4px 12px rgba(232,93,45,.25)}.copy-btn.copied{background:var(--success)}
.message-body{padding:26px 28px;font-family:var(--arabic);font-size:15px;line-height:1.85;color:var(--text);direction:rtl;text-align:right;white-space:pre-wrap;word-wrap:break-word}.message-body .placeholder{background:#FFF4E5;color:var(--accent-dark);padding:1px 7px;border-radius:4px;font-size:13px;font-weight:600;font-family:var(--mono);border:1px solid rgba(232,93,45,.25);direction:ltr;display:inline-block}.message-body .bold{font-weight:700;color:var(--text)}
.variant-label{display:flex;align-items:center;gap:8px;margin:28px 0 12px;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}.variant-label:first-child{margin-top:0}.variant-label::before{content:'';flex-shrink:0;width:4px;height:4px;background:var(--accent);border-radius:50%}.variant-label::after{content:'';flex:1;height:1px;background:var(--border)}
.notes{margin-top:18px;background:var(--surface);border:1px dashed var(--border-strong);border-radius:var(--radius);padding:14px 18px;font-size:13px;color:var(--text-dim);line-height:1.6}.notes strong{color:var(--text);font-weight:600}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--surface);padding:12px 22px;border-radius:100px;font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);opacity:0;transition:transform .25s cubic-bezier(.34,1.25,.64,1),opacity .25s;pointer-events:none;z-index:100}.toast.show{transform:translateX(-50%) translateY(0);opacity:1}.toast-icon{width:18px;height:18px;background:var(--success);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px}
.empty{text-align:center;padding:60px 20px;color:var(--text-faint)}.empty h3{font-family:var(--display);font-size:22px;font-weight:500;color:var(--text-dim);margin-bottom:8px;font-style:italic}
@media(max-width:860px){.app{grid-template-columns:1fr;grid-template-rows:auto 1fr}.sidebar{border-right:none;border-bottom:1px solid var(--border);max-height:44vh}.main{padding:24px 20px 60px}.content-title{font-size:26px}.message-body{padding:18px 20px;font-size:14.5px}}
</style>

<script>

const DATA = {"general": [{"id": "welcome", "group": "QUALIFY", "emoji": "🎯", "title": "Welcome + Qualifier", "titleEm": "Qualifier", "eyebrow": "No age yet", "description": "When parent sends generic greeting. Opens with credentials, asks 3 qualifying Qs including Camp vs Course routing.", "chips": [{"label": "3 Qs", "type": ""}, {"label": "Camp/Course routing", "type": "hot"}, {"label": "Credentials", "type": ""}], "flow": {"title": "📋 Sales Flow", "steps": ["ابعت الرسالة التحتية", "استنى السن + الموقع + كامب ولا كورس", "لو قال <b>كامب</b> → اضغط 🏕️ Camp فوق", "لو قال <b>كورس</b> → اضغط 📚 Course فوق"]}, "messages": [{"body": "أهلاً بحضرتك 😊\n\n*EduZone Tech* — أكاديمية برمجة وتكنولوجيا للأطفال من 6 لـ 18 سنة، طلابنا في 11 دولة 🇪🇬🇦🇪🇸🇦🇬🇧🇦🇺🇨🇦🇸🇪🇮🇹🇵🇸🇩🇿🇾🇪\n\nالدراسة لايف (أونلاين أو أونسايت في القاهرة) — سيشن ساعتين أسبوعياً مع مدرب ثابت، ومنصة تفاعلية للتمارين والمشاريع ✨\n\nعلشان أرشح الأنسب لطفلك:\n\n1️⃣ كام سنة الطفل؟\n2️⃣ في مصر ولا بره؟\n3️⃣ مهتمين بـ *كورسات طول السنة* 📚 ولا *Summer Camp 2026* ☀️؟\n\n⭐ EduZone Tech | 8+ سنين | +20,000 طالب | 4.8 تقييم\n💳 متاح تقسيط Sympl 0% أو كريديت كارد"}]}, {"id": "route", "group": "QUALIFY", "emoji": "🔀", "title": "Camp or Course?", "titleEm": "Routing", "eyebrow": "After parent gives age — route them", "description": "Present both options clearly after knowing the age. Parent picks the path, then you switch to the correct tab.", "chips": [{"label": "Routing step", "type": "hot"}, {"label": "Use after age known", "type": ""}], "messages": [{"body": "ممتاز! بالنسبة لسنه عندنا اختيارين حلوين:\n\n*1️⃣ Summer Camp 2026* ☀️\nبرنامج مكثف — شهر كامل (90 ساعة)\nمن 9 الصبح لـ 3 بعد الظهر، أحد لخميس\nحضوري أو أونلاين\nابنك هيبني مشاريع حقيقية خلال شهر واحد بس!\n\n*2️⃣ كورسات طول السنة* 📚\nسيشن واحد في الأسبوع (ساعتين)\n1:1 خاص أو مجموعة صغيرة\nيبدأ في أي وقت — مش لازم ينتظر الصيف\n\nحابين أحكيلكم عن أنهي واحد؟ 😊"}]}, {"id": "below6", "group": "QUALIFY", "emoji": "🚫", "title": "Below 6", "titleEm": "Rejection", "eyebrow": "Age below 6", "description": "Polite rejection. Offer future registration + nursery alternative (EduZone STEAM Nursery, Sheikh Zayed, ages 1.4–4.5).", "chips": [{"label": "Polite", "type": ""}, {"label": "Nursery upsell", "type": ""}], "messages": [{"body": "شكراً لاهتمام حضرتك! 🌸\n\nطفلك لسه أصغر من السن اللي بنبدأ معاه (بنبدأ من 6 سنين فما فوق).\n\nممكن نسجل بياناتكم ونرجعلكم لما يوصل السن المناسب ✨\n\nلو مهتمين بمرحلة الحضانة:\n🌱 *EduZone International STEAM Nursery* (Sheikh Zayed)\nمن 1.4 لـ 4.5 سنة — تعليم مبكر STEAM\n\nتحبي تفاصيل الحضانة؟"}]}, {"id": "age6", "group": "QUALIFY", "emoji": "🏠", "title": "Age 6–6.5", "titleEm": "On-site only", "eyebrow": "6–6.5 years old", "description": "Must be on-site Cairo — online NOT permitted. Pitches WeDo Junior Robotics (LEGO, hands-on). Full pricing included.", "chips": [{"label": "On-site Cairo only", "type": "warn"}, {"label": "WeDo Robotics", "type": ""}, {"label": "Hands-on LEGO", "type": ""}, {"label": "Full pricing", "type": ""}], "messages": [{"body": "أهلاً بحضرتك 😊\n\nالسن ده من أحلى الأعمار للبداية! ✨ بس في السن ده بنشترط حضور على الطبيعة — الأطفال الصغيرين محتاجين تفاعل مباشر مع المدرب.\n\n*لو حضرتك في القاهرة:*\n🏠 فرع التجمع الخامس (Downtown Mall, S1, First Floor)\n🏠 فرع الشيخ زايد (كمبوند الخمائل)\n\n*WeDo Junior Robotics* — البداية المثالية لسنه 🦾\n\nبيركب روبوتات LEGO WeDo بإيده وبيبرمجها — مش شاشة، قطع ليجو حقيقية!\n\n✅ بيركب ويبرمج من أول سيشن\n✅ بينمي مهاراته الحركية والإبداعية\n✅ بيفهم مبادئ البرمجة والهندسة\n✅ play-based learning ممتع\n\n🌉 بعدها: Game Coding ➡️ Mobile App ➡️ Game Engine ➡️ Python & AI\n\n⏱️ 15 سيشن (~4 شهور)\n\n🎬 شوفي أطفال زيه:\nhttps://www.instagram.com/reel/DF5P2v_IXtl\n\n💰 1:1 خاص: *9,400 جنيه* | جروب: *6,580 جنيه* (خصم 30%)\n💳 Sympl 0% أو كريديت كارد\n\n1️⃣ أقرب لأي فرع؟\n2️⃣ 1:1 ولا جروب؟\n3️⃣ أي أيام أنسب؟"}]}, {"id": "pvg", "group": "HANDLERS", "emoji": "❓", "title": "1:1 vs Group", "titleEm": "Explainer", "eyebrow": "Parent asks the difference", "description": "Fair comparison. Ends with const GROUP_LABELS={'QUALIFY':'Qualify','HANDLERS':'Handlers','COUNTRY':'Country','CAMP OVERVIEW':'Camp Overview','CAMP 7-8':'Camp 7-8','CAMP 9-10':'Camp 9-10','CAMP 11-14':'Camp 11-14','CAMP 15-18':'Camp 15-18','CAMP INFO':'Camp Info','TRACKS 6-9':'Ages 6-9','TRACKS 8-10':'Ages 8-10','TRACKS 11-16':'Ages 11-16','TRACKS 13-16':'Ages 13-16','TRACKS HANDLERS':'Handlers'};
let currentMode='general',activeId=null,searchTerm='';
function setMode(m){currentMode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));document.querySelector('.mode-btn[data-mode="'+m+'"]').classList.add('active');searchTerm='';document.getElementById('searchInput').value='';const items=getFilteredData();activeId=items.length?items[0].id:null;renderNav();renderContent()}
function getFilteredData(){const items=DATA[currentMode]||[];if(!searchTerm)return items;const t=searchTerm.toLowerCase();return items.filter(i=>[i.title,i.titleEm,i.eyebrow,i.description,...(i.chips||[]).map(c=>c.label),...(i.messages||[]).map(m=>m.body+(m.label||''))].join(' ').toLowerCase().includes(t))}
function renderNav(){const data=getFilteredData(),groups={};data.forEach(i=>{if(!groups[i.group])groups[i.group]=[];groups[i.group].push(i)});const nav=document.getElementById('nav');let h='';Object.keys(GROUP_LABELS).forEach(g=>{if(!groups[g])return;h+='<div class="nav-group"><div class="nav-group-label">'+GROUP_LABELS[g]+'</div>';groups[g].forEach(i=>{const a=i.id===activeId?'active':'',bc=currentMode==='camp'?'badge-camp':currentMode==='course'?'badge-course':'';h+='<div class="nav-item '+a+'" data-id="'+i.id+'"><span class="nav-item-emoji">'+i.emoji+'</span><span class="nav-item-label">'+esc(i.title)+'</span><span class="nav-item-badge '+bc+'">'+esc(i.titleEm)+'</span></div>'});h+='</div>'});if(!data.length)h='<div class="empty"><h3>No matches</h3><p>Try different search</p></div>';nav.innerHTML=h;nav.querySelectorAll('.nav-item').forEach(el=>{el.addEventListener('click',()=>{activeId=el.dataset.id;renderNav();renderContent()})});document.getElementById('totalCount').textContent=data.length}
function renderContent(){const items=DATA[currentMode]||[],item=items.find(i=>i.id===activeId),c=document.getElementById('content');if(!item){c.innerHTML='<div class="empty"><h3>Select a template</h3></div>';return}let h='<div class="content-header"><div class="content-eyebrow">'+esc(item.eyebrow)+'</div><h1 class="content-title">'+esc(item.title)+' <em>'+esc(item.titleEm)+'</em></h1><p class="content-description">'+esc(item.description)+'</p><div class="meta-chips">'+(item.chips||[]).map(x=>'<span class="chip '+(x.type?'chip-'+x.type:'')+'">'+esc(x.label)+'</span>').join('')+'</div></div>';if(item.flow){h+='<div class="flow-card"><h4>'+item.flow.title+'</h4><div class="flow-steps">';item.flow.steps.forEach((s,i)=>{h+='<div class="flow-step"><div class="flow-num">'+(i+1)+'</div><div>'+s+'</div></div>'});h+='</div></div>'}item.messages.forEach((msg,idx)=>{if(msg.label)h+='<div class="variant-label">'+esc(msg.label)+'</div>';h+='<div class="message-card"><div class="message-card-head"><div class="message-card-head-label"><span class="wa-dot"></span> WhatsApp Message</div><button class="copy-btn" data-idx="'+idx+'"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span class="cbl">Copy</span></button></div><div class="message-body">'+fmt(msg.body)+'</div></div>'});if(item.note)h+='<div class="notes">\u{1F4A1} '+item.note+'</div>';c.innerHTML=h;c.querySelectorAll('.copy-btn').forEach(btn=>{btn.addEventListener('click',()=>{cp(item.messages[parseInt(btn.dataset.idx)].body,btn)})});document.querySelector('.main').scrollTop=0}
function fmt(t){let o=esc(t);o=o.replace(/\*([^\*\n]+?)\*/g,'<span class="bold">$1</span>');o=o.replace(/\[([A-Z_\/0-9]+)\]/g,'<span class="placeholder">[$1]</span>');return o}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function cp(t,btn){navigator.clipboard.writeText(t).then(()=>{const l=btn.querySelector('.cbl');btn.classList.add('copied');l.textContent='Copied!';toast();setTimeout(()=>{btn.classList.remove('copied');l.textContent='Copy'},1800)}).catch(()=>{const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;top:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast()}catch(e){}document.body.removeChild(ta)})}
function toast(){const t=document.getElementById('toast');t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2200)}
document.getElementById('searchInput').addEventListener('input',e=>{searchTerm=e.target.value;renderNav()});
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();const s=document.getElementById('searchInput');s.focus();s.select()}if(e.key==='Escape'&&document.activeElement===document.getElementById('searchInput')){document.getElementById('searchInput').value='';searchTerm='';document.getElementById('searchInput').blur();renderNav()}});
setMode('general');
</script>
